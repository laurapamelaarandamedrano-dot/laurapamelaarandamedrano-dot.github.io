<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Capital | No Cap We On Top</title>
    <style>
        :root {
            --pink-neon: #FF007F;
            --cyan-digital: #00FFFF;
            --gold: #FFD700;
            --bg-space: #050005;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-space);
            color: white; font-family: 'Helvetica Neue', sans-serif;
            overflow-x: hidden; text-align: center;
        }

        /* --- FONDO NEBULA PINK --- */
        #nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 127, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.2) 0%, transparent 50%),
                #000;
        }

        /* --- EL GLOBO 3D EN CSS PURO (Gira de verdad) --- */
        .world-container {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            z-index: -1; pointer-events: none;
        }

        .globe {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), 
                        linear-gradient(to right, #001 0%, var(--cyan-digital) 50%, #001 100%);
            background-size: cover;
            position: relative;
            /* EFECTO DE ESFERA */
            box-shadow: inset -30px -30px 60px rgba(0,0,0,1), 
                        inset 10px 10px 40px rgba(255, 255, 255, 0.2),
                        0 0 50px rgba(255, 0, 127, 0.3);
            animation: rotateWorld 15s linear infinite;
            overflow: hidden;
        }

        /* Simulación de continentes moviéndose */
        .globe::before {
            content: "";
            position: absolute; width: 200%; height: 100%;
            background: repeating-linear-gradient(90deg, transparent 0, transparent 50px, rgba(255,255,255,0.1) 50px, rgba(255,255,255,0.1) 100px);
            animation: moveContinents 10s linear infinite;
        }

        @keyframes rotateWorld {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes moveContinents {
            from { left: -100%; }
            to { left: 0%; }
        }

        /* --- CONTENIDO --- */
        .content { position: relative; z-index: 1; padding: 80px 20px; }
        
        .brand { 
            font-size: 1.5rem; color: var(--gold); letter-spacing: 12px; 
            text-transform: uppercase; font-weight: bold; margin-bottom: 40px;
            text-shadow: 0 0 15px var(--gold);
        }

        .monitor-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border-radius: 50px; border: 1px solid var(--cyan-digital);
            padding: 20px; max-width: 500px; margin: 0 auto 50px;
        }
        .bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .fill { width: 88%; height: 100%; background: linear-gradient(90deg, var(--pink-neon), var(--cyan-digital)); }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; max-width: 1000px; margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 25px; border-radius: 20px; backdrop-filter: blur(10px); text-align: left;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--pink-neon); transform: translateY(-5px); }

        /* --- ESTRELLAS FUGACES --- */
        .shooting {
            position: absolute; width: 2px; height: 100px;
            background: linear-gradient(to bottom, var(--pink-neon), transparent);
            animation: shoot 4s linear infinite; opacity: 0;
        }
        @keyframes shoot {
            0% { transform: translateY(-100px) translateX(0) rotate(45deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(-400px) rotate(45deg); opacity: 0; }
        }

        /* --- GLITTER --- */
        .glitter { position: absolute; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; animation: spark 1s forwards; z-index: 1000; }
        @keyframes spark { to { opacity: 0; transform: translateY(50px) scale(0); } }
    </style>
</head>
<body>

    <div id="nebula"></div>
    <div class="shooting" style="left: 85%; animation-delay: 0s;"></div>
    <div class="shooting" style="left: 15%; animation-delay: 2s;"></div>

    <div class="world-container">
        <div class="globe"></div>
    </div>

    <div class="content">
        <div class="brand">COSMIC CAPITAL</div>
        
        <div class="monitor-card">
            <span style="color: var(--cyan-digital); font-weight: bold; font-size: 0.8rem;">ENERGY MONITOR</span>
            <div class="bar"><div class="fill"></div></div>
            <p style="font-size: 0.7rem; color: var(--pink-neon); margin-top: 5px;">NO CAP WE ON TOP</p>
        </div>

        <div class="grid">
            <div class="card"><h3>Strategic Papers</h3><p>Geopolitics & Power.</p></div>
            <div class="card"><h3>Style Intel</h3><p>Aesthetic rituals.</p></div>
            <div class="card"><h3>Cosmic Paws</h3><p>Pet care strategy.</p></div>
            <div class="card"><h3>Pit Stop</h3><p>F1 Telemetry.</p></div>
        </div>
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const spark = document.createElement('div');
            spark.className = 'glitter';
            spark.style.left = e.pageX + 'px';
            spark.style.top = e.pageY + 'px';
            const colors = ['#FF007F', '#00FFFF', '#FFD700', '#FFFFFF'];
            spark.style.background = colors[Math.floor(Math.random()*colors.length)];
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 1000);
        });
    </script>
</body>
</html>
